services:
  - type: web
    name: propintel-api
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn property_intel.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: "IDP_Projec"
      - key: LANGSMITH_ENDPOINT
        value: "https://aws.api.smith.langchain.com"
