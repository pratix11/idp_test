services:
  postgres:
    image: postgres:16-alpine
    container_name: property_intel_postgres
    environment:
      POSTGRES_USER: property_intel
      POSTGRES_PASSWORD: property_intel_dev_password
      POSTGRES_DB: property_intel
    ports:
      - "5432:5432"
    volumes:
      - property_intel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: property_intel_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - property_intel_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  property_intel_pgdata:
  property_intel_qdrant_data:
